<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Uptime Monitor</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .company { margin: 10px 0; padding: 10px; border: 1px solid #ccc; border-radius: 5px; }
        .operational { background-color: #d4edda; }
        .degraded { background-color: #fff3cd; }
        .partial_outage { background-color: #f8d7da; }
        .major_outage { background-color: #f5c6cb; }
        .unknown { background-color: #e2e3e5; }
    </style>
</head>
<body>
    <h1>AI Uptime Monitor</h1>
    <div id="status"></div>

    <script>
        async function fetchStatus() {
            try {
                const response = await fetch('/api/status');
                const data = await response.json();
                displayStatus(data.companies);
            } catch (error) {
                document.getElementById('status').innerHTML = '<p>Error fetching status.</p>';
            }
        }

        function displayStatus(companies) {
            const container = document.getElementById('status');
            container.innerHTML = companies.map(company => `
                <div class="company ${company.currentStatus}">
                    <h3>${company.emoji} ${company.name}</h3>
                    <p>Status: ${company.currentStatus}</p>
                    <p>Uptime: ${company.uptimePercent ? company.uptimePercent.toFixed(2) + '%' : 'N/A'}</p>
                    <p>Active Incidents: ${company.activeIncidents || 0}</p>
                </div>
            `).join('');
        }

        fetchStatus();
        setInterval(fetchStatus, 60000); // Refresh every minute
    </script>
</body>
</html>
